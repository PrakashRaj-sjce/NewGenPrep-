name: Deploy Backend to Azure VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/interview-backend:latest

    - name: Deploy on Azure VM
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/interview-backend:latest
          docker stop interview-backend || true
          docker rm interview-backend || true
          docker run -d \
          --name interview-backend \
          -p 8001:8000 \
          --restart unless-stopped \
          -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
          -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
          -e AZURE_OPENAI_KEY="${{ secrets.AZURE_OPENAI_KEY }}" \
          -e AZURE_OPENAI_BASE="${{ secrets.AZURE_OPENAI_BASE }}" \
          -e AZURE_OPENAI_CHAT_DEPLOYMENT="${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}" \
          -e AZURE_OPENAI_API_VERSION="2025-01-01-preview" \
          -e ENVIRONMENT="production" \
          ${{ secrets.DOCKER_USERNAME }}/interview-backend:latest

